name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (variante TypeScript)
        run: npm run build

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Lint PHP (variante OVH)
        run: find php-ovh -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Smoke tests (les deux variantes contre les fakes IMAP/SMTP)
        run: npm run test:smoke
