services:
  mcp-mail:
    build:
      context: .
      dockerfile: Dockerfile
    image: infomaniak/mcp-server-mail:local
    container_name: mcp-mail
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
