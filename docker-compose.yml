services:
  mcp-mail:
    build:
      context: .
      dockerfile: Dockerfile
    image: infomaniak/mcp-server-mail:local
    container_name: mcp-mail
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: mcp-caddy
    restart: unless-stopped
    depends_on:
      mcp-mail:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      MCP_PUBLIC_DOMAIN: ${MCP_PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
